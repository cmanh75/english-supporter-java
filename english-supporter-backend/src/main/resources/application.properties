# Application Configuration
spring.application.name=english-supporter-backend
server.port=8082

# Database Configuration - MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/englishsupporter
spring.datasource.username=root
spring.datasource.password=cmanh7524
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
# Use 'create' to drop and recreate tables on startup (development only)
# Use 'update' to update schema without losing data
# Use 'validate' for production (no schema changes)
# Use 'create-drop' to drop tables on shutdown
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.englishsupporter=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Word Import Configuration
# Set word.import.enabled=true to enable automatic import on startup
# Set word.import.file=path/to/words.txt to specify file path
# word.import.enabled=true
# word.import.file=words.txt

